version: "3.9"

services:
  api:
    container_name: dengue-api
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8001:8001"

    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8001

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
