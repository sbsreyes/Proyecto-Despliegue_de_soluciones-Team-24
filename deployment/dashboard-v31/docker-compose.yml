version: "3.9"

services:
  dashboard:
    container_name: dengue-dashboard
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8050:8050"

    environment:
      # URL de la API REST (EC2 separada con la API)
      - API_URL=http://54.242.248.228:8001

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
