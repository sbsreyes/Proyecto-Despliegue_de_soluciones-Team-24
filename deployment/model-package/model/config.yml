# ============================================================
# Configuración del modelo AI-lerta — Dengue Colombia
# ============================================================
package_name: dengue_model
train_data_file: dataset_dengue_completo.csv
target: alerta

# ── Splits temporales ────────────────────────────────────────
train_years:
  - 2009
  - 2010
  - 2011
  - 2012
  - 2013
  - 2014
  - 2015
  - 2016

validation_years:
  - 2017
  - 2018
  - 2019

test_years:
  - 2022
  - 2023
  - 2024

canal_endemico_years:
  - 2009
  - 2010
  - 2011
  - 2012
  - 2013
  - 2014
  - 2015
  - 2016

# ── Filtros de municipios válidos ────────────────────────────
min_semanas_con_casos: 20

# ── Columnas crudas necesarias del dataset ───────────────────
raw_columns:
  - cod_municipio
  - anio
  - semana_epi
  - tipo_dengue
  - casos
  - NOM_MPIO
  - NOM_DPTO
  - altitud_msnm
  - cat_altitud
  - poblacion
  - temp_media_c
  - humedad_pct
  - precip_mm
  - temp_lag2
  - temp_lag3
  - temp_lag4
  - precip_lag2
  - precip_lag3
  - precip_lag4
  - humedad_lag1
  - humedad_lag2
  - humedad_lag3

# ── Features finales que entran al modelo (35 features) ──────
model_features:
  - altitud_msnm
  - cat_altitud_enc
  - anio
  - semana_epi
  - semana_sin
  - semana_cos
  - temporada_lluvias
  - temp_media_c
  - humedad_pct
  - precip_mm
  - grados_dia
  - temp_optima
  - temp_letal
  - temp_inhibicion
  - indice_idoneidad
  - precip_acum4
  - precip_acum8
  - temp_lag2
  - temp_lag3
  - temp_lag4
  - precip_lag2
  - precip_lag3
  - precip_lag4
  - humedad_lag1
  - humedad_lag2
  - humedad_lag3
  - casos_lag1
  - casos_lag2
  - casos_lag3
  - casos_lag4
  - casos_ma4
  - casos_tendencia
  - poblacion
  - año_epidemico
  - post_epidemia

# ── Mapeo categoría altitud (LabelEncoder fit solo en train) ─
cat_altitud_categorias:
  - "Bajo (<1.000 m)"
  - "Medio (1.000-1.800 m)"
  - "Alto (1.800-2.200 m)"
  - "Muy alto (>2.200 m)"
  - "Sin dato"

# ── Años epidémicos / post-epidemia ──────────────────────────
anos_epidemicos:
  - 2010
  - 2013
  - 2016
  - 2019

anos_post_epidemia:
  - 2011
  - 2014
  - 2017

# ── Temporadas de lluvias Colombia (semanas epi) ─────────────
temporada_lluvias_1:
  - 13
  - 22

temporada_lluvias_2:
  - 35
  - 44

# ── Parámetros biológicos Aedes aegypti ──────────────────────
temp_min_desarrollo: 18
temp_optima_min: 26
temp_optima_max: 29
temp_letal: 35
temp_inhibicion: 16
altitud_inhibicion: 2200

# ── Pipeline ─────────────────────────────────────────────────
pipeline_name: dengue_pipeline
pipeline_save_file: "dengue_pipeline-"

# ── XGBoost (mejor modelo según notebook) ────────────────────
xgb_n_estimators: 300
xgb_max_depth: 6
xgb_learning_rate: 0.05
xgb_subsample: 0.8
xgb_colsample_bytree: 0.8
xgb_scale_pos_weight: 5
random_state: 42

umbral_default: 0.5
