# tox.ini — Dengue Model Package
# ===============================
# Automatiza el entrenamiento, tests y construcción del .whl
#
# Uso:
#   tox run -e train          → entrena y guarda el .pkl
#   tox run -e test_package   → entrena + corre tests
#
# Después de pasar los tests, construir el .whl:
#   python3 -m pip install --upgrade build
#   python3 -m build
#   → genera dist/dengue_model-0.0.1-py3-none-any.whl

[tox]
min_version = 4
envlist = test_package
skipsdist = True

[testenv]
basepython = python
install_command = pip install {opts} {packages}

setenv =
    PYTHONPATH=.
    PYTHONHASHSEED=0

# ── Ambiente 1: train ───────────────────────────────────────────────────────
[testenv:train]
envdir = {toxworkdir}/test_package
deps =
    -r{toxinidir}/requirements/requirements.txt
commands =
    python model/train_pipeline.py

# ── Ambiente 2: test_package ────────────────────────────────────────────────
[testenv:test_package]
envdir = {toxworkdir}/test_package
deps =
    -r{toxinidir}/requirements/test_requirements.txt
commands =
    python model/train_pipeline.py
    pytest \
    -s \
    -vv \
    {posargs:tests/}
